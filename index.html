<div id="datetime"></div>

<script>
function updateDateTime(){

    const now = new Date();

    const week = ["日","月","火","水","木","金","土"];

    const date =
        now.getFullYear() + "年" +
        (now.getMonth()+1) + "月" +
        now.getDate() + "日（" +
        week[now.getDay()] + "）";

    const time =
        now.getHours() + "時" +
        now.getMinutes().toString().padStart(2,"0") + "分";

    document.getElementById("datetime").innerHTML =
        date + "<br>" + time;
}

updateDateTime();
setInterval(updateDateTime,1000);

</script>
